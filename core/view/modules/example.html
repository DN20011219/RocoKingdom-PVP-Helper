<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      body{margin:0;font-family:Segoe UI, Arial;background:linear-gradient(180deg,#071426,#081827);color:#dfefff}
      .wrap{padding:16px}
      h1{margin:0 0 8px 0;font-size:18px}
      .card{background:rgba(255,255,255,0.03);padding:12px;border-radius:8px}
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>示例模块</h1>
      <div class="card">
        <p>这是一个占位示例模块。你可以把不同模块以 HTML 文件放到 <strong>modules</strong> 目录下。</p>
        <p>模块可以实现自己的交互逻辑，或通过与主程序通信（未来扩展）来显示内容。</p>
      </div>
    </div>
  </body>
</html>
